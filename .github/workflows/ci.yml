name: CI Checks

# Triggers: runs on every push to dev, feature/*, hotfix/*, and main branches,
# and on pull requests targeting dev or main. Can also be triggered manually
# from the GitHub Actions tab via workflow_dispatch.
on:
  push:
    branches:
      - dev
      - 'feature/**'
      - 'hotfix/**'
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:

  # - Stage 1: Code Quality
  # Runs first, if formatting or style is broken, nothing else runs.
  # Fast-fail design: a lint error stops the pipeline in under 10 seconds
  # rather than wasting time running tests on badly formatted code.
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install ruff black

      # ruff checks for unused imports, undefined names, and style issues.
      # --output-format=github formats errors as GitHub annotations so they
      # appear inline in the PR diff view.
      - name: Run Ruff (style & error checks)
        run: ruff check . --output-format=github

      # black --check doesn't modify any files — it just exits with code 1
      # if anything would be reformatted, which fails the step.
      - name: Run Black (formatting check)
        run: black --check .

  # - Stage 2: Core Checks & Tests
  # Only runs if lint passes (needs: lint).
  # Installs all dependencies, verifies every module imports and compiles,
  # then runs the full test suite with coverage enforcement.
  basic-checks:
    name: Basic Checks & Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Quick sanity check that all third-party and local imports resolve
      # before running anything more expensive
      - name: Verify imports
        run: |
          python -c "import requests, pandas, streamlit, matplotlib, pytest"
          python -c "import api, database, ui_helpers, dashboard, validation, logger_setup"

      # py_compile catches syntax errors without executing the module
      - name: Check app entry point
        run: python -m py_compile app.py

      - name: Check all scripts compile
        run: |
          python -m py_compile get_top_movies.py
          python -m py_compile analyze_movies.py
          python -m py_compile api.py
          python -m py_compile database.py
          python -m py_compile ui_helpers.py
          python -m py_compile dashboard.py
          python -m py_compile validation.py
          python -m py_compile logger_setup.py

      # --cov-fail-under=50 means the step fails if total coverage drops
      # below 50%. In practice we're at 93%+ but the threshold acts as a
      # hard floor to stop coverage regressing silently over time.
      - name: Run unit tests with coverage
        run: |
          pip install pytest-cov
          python -m pytest --cov=. --cov-report=term-missing --cov-fail-under=50

      # Save the .coverage file as a downloadable artifact so it can be
      # inspected after the run if needed
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # - Stage 3a: Dev Branch Validation
  # Only runs on the dev branch or PRs targeting dev.
  # Checks that the dashboard modules load correctly and that the committed
  # movies.db has the right schema and contains valid data.
  dev-validation:
    name: Dev Validation
    if: github.ref == 'refs/heads/dev' || github.base_ref == 'dev'
    runs-on: ubuntu-latest
    needs: basic-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Confirms the key functions in each module are importable,
      # catches renamed or deleted exports before they reach main
      - name: Validate dashboard module structure
        run: |
          python -c "from ui_helpers import initialize_session_state, go_to_dashboard, poster_url"
          python -c "from database import get_local_data"
          python -c "from dashboard import render_home_page, render_dashboard_page"

      # PRAGMA table_info returns one row per column, we extract the names
      # and compare against the expected set. Any missing column fails the step.
      - name: Validate database schema
        run: |
          python - <<'EOF'
          import sqlite3, sys

          EXPECTED_COLUMNS = {"movie_id", "date", "title", "rating", "votes", "release_date", "popularity", "category"}

          try:
              conn = sqlite3.connect("movies.db")
              cursor = conn.cursor()
              cursor.execute("PRAGMA table_info(movies)")
              columns = {row[1] for row in cursor.fetchall()}
              conn.close()
          except Exception as e:
              print(f"ERROR: Could not connect to database: {e}")
              sys.exit(1)

          missing = EXPECTED_COLUMNS - columns
          if missing:
              print(f"ERROR: Missing columns in movies table: {missing}")
              sys.exit(1)

          print(f"Schema valid. Columns found: {columns}")
          EOF

      # Checks record count, null titles, and out-of-range ratings.
      # Any failure exits with code 1 which fails the CI step.
      - name: Validate data integrity
        run: |
          python - <<'EOF'
          import sqlite3, sys

          conn = sqlite3.connect("movies.db")
          cursor = conn.cursor()

          cursor.execute("SELECT COUNT(*) FROM movies")
          count = cursor.fetchone()[0]
          print(f"Total movie records: {count}")

          if count == 0:
              print("ERROR: movies table is empty")
              sys.exit(1)

          cursor.execute("SELECT COUNT(*) FROM movies WHERE title IS NULL OR title = ''")
          nulls = cursor.fetchone()[0]
          if nulls > 0:
              print(f"WARNING: {nulls} records with missing titles found")

          cursor.execute("SELECT COUNT(*) FROM movies WHERE rating < 0 OR rating > 10")
          invalid_ratings = cursor.fetchone()[0]
          if invalid_ratings > 0:
              print(f"ERROR: {invalid_ratings} records with out-of-range ratings")
              sys.exit(1)

          cursor.execute("SELECT AVG(rating), MIN(rating), MAX(rating) FROM movies")
          avg, mn, mx = cursor.fetchone()
          print(f"Rating stats — avg: {avg:.2f}, min: {mn}, max: {mx}")

          conn.close()
          print("Data integrity check passed")
          EOF

  # - Stage 3b: Production Validation
  # Only runs on main or PRs targeting main, stricter than dev validation.
  # Requires at least 10 records, validates module exports with smoke tests,
  # and warns about unpinned dependencies.
  production-check:
    name: Production Check
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    needs: basic-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Stricter version of the dev schema check, also requires a minimum
      # record count and checks category diversity
      - name: Full schema & integrity validation
        run: |
          python - <<'EOF'
          import sqlite3, sys

          EXPECTED_COLUMNS = {"movie_id", "date", "title", "rating", "votes", "release_date", "popularity", "category"}

          conn = sqlite3.connect("movies.db")
          cursor = conn.cursor()

          cursor.execute("PRAGMA table_info(movies)")
          columns = {row[1] for row in cursor.fetchall()}
          missing = EXPECTED_COLUMNS - columns
          if missing:
              print(f"FATAL: Missing columns: {missing}")
              sys.exit(1)

          cursor.execute("SELECT COUNT(*) FROM movies")
          count = cursor.fetchone()[0]
          if count < 10:
              print(f"FATAL: Too few records in production DB ({count}). Expected at least 10.")
              sys.exit(1)

          cursor.execute("SELECT COUNT(*) FROM movies WHERE rating < 0 OR rating > 10")
          if cursor.fetchone()[0] > 0:
              print("FATAL: Invalid rating values detected")
              sys.exit(1)

          cursor.execute("SELECT COUNT(DISTINCT category) FROM movies")
          categories = cursor.fetchone()[0]
          if categories < 2:
              print(f"WARNING: Only {categories} category/categories present. Expected at least 2.")

          conn.close()
          print(f"Production DB validated: {count} records across {categories} categories")
          EOF

      # Smoke tests: imports and calls each exported function with known-good
      # inputs to confirm nothing is broken at the module boundary level
      - name: Validate all module exports
        run: |
          python - <<'EOF'
          from validation import is_valid_movie
          from ui_helpers import poster_url, initialize_session_state, go_to_dashboard
          from database import get_local_data
          from logger_setup import get_logger

          result, reason = is_valid_movie({
              "id": 1, "title": "Test", "vote_average": 7.5,
              "vote_count": 100, "popularity": 20.0, "release_date": "2024-01-01"
          })
          assert result is True, f"Validation smoke test failed: {reason}"

          url = poster_url("/test.jpg")
          assert url == "https://image.tmdb.org/t/p/w500/test.jpg", "poster_url failed"

          print("All module export checks passed")
          EOF

      # Warns if any dependency in requirements.txt is not pinned to a specific
      # version, unpinned deps can cause silent breakage when packages update
      - name: Confirm requirements are pinned
        run: |
          python - <<'EOF'
          import sys

          with open("requirements.txt") as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith("#")]

          unpinned = [l for l in lines if "==" not in l]
          if unpinned:
              print(f"WARNING: Unpinned dependencies detected: {unpinned}")
          else:
              print("All dependencies are pinned.")
          EOF

  # - Stage 4: Pipeline Summary
  # Always runs regardless of whether earlier stages passed or failed (if: always()).
  # Writes a markdown table to the GitHub Actions job summary tab so the
  # overall result is visible at a glance without opening individual job logs.
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, basic-checks]
    if: always()

    steps:
      - name: Report pipeline result
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Basic Checks & Tests | ${{ needs.basic-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
